name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Version Name
        id: version
        run: |
          VERSION=$(date -d "8 hour" -u +3.%y.%m%d%H)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Clear 18PlusList.txt
        run: |
          echo "" > app/src/main/assets/18PlusList.txt

      - name: Configure Keystore
        run: |
          cp .github/workflows/legado.jks app/legado.jks
          cat >> gradle.properties << EOF
          RELEASE_STORE_FILE=./legado.jks
          RELEASE_KEY_ALIAS=legado
          RELEASE_STORE_PASSWORD=gedoor_legado
          RELEASE_KEY_PASSWORD=gedoor_legado
          EOF

      - name: Build Beta Package
        run: |
          sed "/def version/c def version = \"${{ env.VERSION }}\"" app/build.gradle -i
          chmod +x gradlew
          ./gradlew assembleAppRelease --build-cache --parallel --daemon --warning-mode all
          mkdir -p apk_output
          find app/build/outputs/apk -name "*.apk" -exec mv {} apk_output/legado_release_${{ env.VERSION }}.apk \;

      - name: Build Formal Release Package
        run: |
          sed "s/applicationIdSuffix '.release'/applicationIdSuffix '.releaseS'/" app/build.gradle -i
          ./gradlew assembleAppRelease --build-cache --parallel --daemon --warning-mode all
          find app/build/outputs/apk -name "*.apk" -exec mv {} apk_output/legado_releaseS_${{ env.VERSION }}.apk \;

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Legado ${{ env.VERSION }}
          files: apk_output/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate latest.json
        env:
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: |
          python3 - <<'PYEOF'
          import json, os, glob

          version    = os.environ['VERSION']
          public_url = os.environ['R2_PUBLIC_URL'].rstrip('/')

          with open('app/src/main/assets/updateLog.md', encoding='utf-8') as f:
              update_log = f.read()

          assets = []
          for apk_path in sorted(glob.glob('apk_output/*.apk')):
              name = os.path.basename(apk_path)
              url  = f"{public_url}/releases/{version}/{name}"
              if 'releaseS' in name:
                  variant = 'BETA_RELEASES'
              elif 'releaseA' in name:
                  variant = 'BETA_RELEASEA'
              elif 'release' in name:
                  variant = 'BETA_RELEASE'
              else:
                  variant = 'OFFICIAL'
              assets.append({'name': name, 'url': url, 'variant': variant})

          data = {
              'versionName': version,
              'updateLog': update_log,
              'assets': assets
          }
          with open('latest.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
          print(f"✅ 已生成 latest.json: version={version}, assets={[a['name'] for a in assets]}")
          PYEOF

      - name: Upload APKs and latest.json to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          ENDPOINT="https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"

          # 上传各 APK 到版本子目录
          for apk in apk_output/*.apk; do
            filename=$(basename "$apk")
            aws s3 cp "$apk" "s3://${{ secrets.R2_BUCKET }}/releases/${{ env.VERSION }}/$filename" \
              --endpoint-url "$ENDPOINT" \
              --no-progress
            echo "✅ 已上传: $filename"
          done

          # 上传 latest.json 到根目录（固定 URL，app 检查更新用）
          aws s3 cp latest.json "s3://${{ secrets.R2_BUCKET }}/latest.json" \
            --endpoint-url "$ENDPOINT" \
            --content-type "application/json" \
            --no-progress
          echo "✅ 已更新 latest.json"

      - name: Clean up old releases in R2 (Keep latest 10)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          ENDPOINT="https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          BUCKET="s3://${{ secrets.R2_BUCKET }}/releases/"
          
          echo "Fetching versions from R2..."
          # 获取所有版本号目录并按版本排序
          VERSIONS=$(aws s3 ls "$BUCKET" --endpoint-url "$ENDPOINT" | awk '{print $2}' | sed 's/\///g' | sort -V)
          
          # 计算版本数量
          TOTAL_VERSIONS=$(echo "$VERSIONS" | grep -v '^$' | wc -l)
          echo "Total versions found: $TOTAL_VERSIONS"
          
          if [ "$TOTAL_VERSIONS" -gt 10 ]; then
            # 取出需要删除的旧版本（排除最后10个）
            VERSIONS_TO_DELETE=$(echo "$VERSIONS" | head -n -10)
            for ver in $VERSIONS_TO_DELETE; do
              if [ -n "$ver" ]; then
                echo "🗑️ Deleting old version: $ver"
                aws s3 rm "$BUCKET$ver/" --recursive --endpoint-url "$ENDPOINT"
              fi
            done
            echo "✅ Cleanup complete."
          else
            echo "No cleanup needed. (<= 10 versions)"
          fi

      - name: Output Download URLs
        run: |
          echo "## 📦 APK 下载地址" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for apk in apk_output/*.apk; do
            filename=$(basename "$apk")
            echo "- [$filename](${{ secrets.R2_PUBLIC_URL }}/releases/${{ env.VERSION }}/$filename)" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 latest.json: ${{ secrets.R2_PUBLIC_URL }}/latest.json" >> $GITHUB_STEP_SUMMARY

