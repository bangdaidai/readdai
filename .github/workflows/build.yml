name: Build Signed Release APK
on:
  push:
    branches: [main, trae/solo-agent-2k73BO]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Android Signing (Using Repository's legado.jks)
        run: |
          echo "✅ Setting up signing keys using repository's legado.jks..."
          
          # 复制现有 legado.jks 到 app 目录
          cp ./.github/workflows/legado.jks ./app/legado.jks
          
          # 写入 gradle.properties
          echo "RELEASE_STORE_FILE=./app/legado.jks" >> ./gradle.properties
          echo "RELEASE_STORE_PASSWORD=legado" >> ./gradle.properties
          echo "RELEASE_KEY_ALIAS=legado" >> ./gradle.properties
          echo "RELEASE_KEY_PASSWORD=legado" >> ./gradle.properties
          
          echo "✅ Signing configuration completed"

      - name: Build Release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleAppRelease --no-daemon -x lint

      - name: Check APK output
        run: |
          echo "📦 Checking for signed APK files..."
          find app/build/outputs -name "*.apk" -type f
          ls -la app/build/outputs/apk/app/release/ || echo "Release directory not found"

      - name: Prepare APK for Upload
        id: prepare_apk
        run: |
          # 获取生成的APK文件名
          APK_FILE=$(find app/build/outputs/apk/app/release -name "*.apk" -type f | head -1)
          echo "APK_FILE=$APK_FILE" >> $GITHUB_ENV
          echo "📦 Found APK: $APK_FILE"
          
          # 获取APK文件名（不含路径）
          APK_NAME=$(basename "$APK_FILE")
          echo "APK_NAME=$APK_NAME" >> $GITHUB_ENV

      - name: Upload Signed APK
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.APK_NAME }}
          path: ${{ env.APK_FILE }}
          retention-days: 30
