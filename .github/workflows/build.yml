name: Build Signed Release APK
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Android Signing
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEY_STORE }}
        run: |
          if [ ! -z "$KEYSTORE_BASE64" ]; then
            echo "✅ Using RELEASE_KEY_STORE secret for consistent signing"
            echo "Setting up signing keys..."
            # 使用固定的密钥文件路径，确保签名一致性
            mkdir -p $GITHUB_WORKSPACE/keystore
            echo "$KEYSTORE_BASE64" | base64 --decode > $GITHUB_WORKSPACE/keystore/release.keystore
            echo "RELEASE_STORE_FILE=./keystore/release.keystore" >> gradle.properties
            echo "RELEASE_STORE_PASSWORD=${{ secrets.RELEASE_STORE_PASSWORD }}" >> gradle.properties
            echo "RELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }}" >> gradle.properties
            echo "RELEASE_KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }}" >> gradle.properties
            echo "✅ Keystore setup completed at ./keystore/release.keystore"
            ls -la $GITHUB_WORKSPACE/keystore/release.keystore
          else
            echo "⚠️ No keystore configured, using debug signing"
            echo "⚠️ This will cause different signatures for each build!"
            echo "⚠️ Please configure RELEASE_KEY_STORE secret in GitHub Settings"
          fi

      - name: Build Release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleAppRelease --no-daemon -x lint

      - name: Check APK output
        run: |
          echo "📦 Checking for signed APK files..."
          find app/build/outputs -name "*.apk" -type f
          ls -la app/build/outputs/apk/app/release/ || echo "Release directory not found"

      - name: Upload Signed APK
        uses: actions/upload-artifact@v6
        with:
          name: legado_release_signed_apk
          path: app/build/outputs/apk/app/release/*.apk
          retention-days: 30

      - name: Generate Version Info
        id: version
        run: |
          # 使用基于日期的版本号格式
          VERSION_CODE=$(date -u +3.%y%m%d%H%M)
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "📦 Building version: $VERSION_CODE"
          
          # 显示当前 git 信息
          echo "Git commit: $(git rev-parse --short HEAD)"
          echo "Git branch: $(git rev-parse --abbrev-ref HEAD)"

      - name: Create Release Tag
        run: |
          TAG_NAME="v${{ steps.version.outputs.VERSION_CODE }}"
          echo "Release version: $TAG_NAME"
          
          # 配置 git 用户信息
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 检查标签是否已存在
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG_NAME"; then
            echo "⚠️ Tag $TAG_NAME already exists on remote, using existing tag"
          else
            echo "Creating new tag: $TAG_NAME"
            git tag $TAG_NAME
            git push origin $TAG_NAME || echo "Failed to push tag"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.VERSION_CODE }}
          name: "Legado ${{ steps.version.outputs.VERSION_CODE }}"
          body: |
            ## 📦 自动化构建发布
            
            **构建时间**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
            **Commit**: ${{ github.sha }}
            **版本**: ${{ steps.version.outputs.VERSION_CODE }}
            **分支**: ${{ github.ref_name }}
            
            ### 📥 下载说明
            - 直接下载 APK 文件即可安装
            - 签名一致，支持覆盖安装
            
            ### 🔧 构建信息
            - 构建类型: Release
            - 目标平台: Android
            - 最小 SDK: 24
            - 目标 SDK: 36
          draft: false
          prerelease: false
          generate_release_notes: true
          files: app/build/outputs/apk/app/release/*.apk
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
