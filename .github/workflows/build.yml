name: Build APK
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleAppDebug --no-daemon -x lint

      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: legado_debug_apk
          path: app/build/outputs/apk/app/debug/*.apk
