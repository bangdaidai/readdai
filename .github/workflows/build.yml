name: Build Signed Release APK
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Android Build Configuration
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEY_STORE_BASE64 }}  # 改为你的密钥名
        run: |
          # 创建基础配置
          echo "🔧 Setting up build configuration..."
          
          # 创建包含所有必要配置的 gradle.properties
          cat > gradle.properties << EOF
# 基本 Gradle 配置
org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=true
org.gradle.daemon=false

# Android 配置
android.useAndroidX=true
android.enableJetifier=true
kotlin.code.style=official
kotlin.incremental=true

# SDK 版本
compile_sdk_version=36
min_sdk_version=24
target_sdk_version=36

# Cronet 配置
CronetVersion=119.0.6045.134
CronetMainVersion=119
EOF
          
          # 检查是否有密钥库配置
          if [ ! -z "$KEYSTORE_BASE64" ]; then
            echo "✅ Found keystore secret, setting up signing..."
            
            # 创建密钥库目录
            mkdir -p $GITHUB_WORKSPACE/keystore
            
            # 解码并保存密钥库
            echo "$KEYSTORE_BASE64" | base64 --decode > $GITHUB_WORKSPACE/keystore/release.keystore
            
            # 验证密钥库
            KEYSTORE_SIZE=$(stat -c%s $GITHUB_WORKSPACE/keystore/release.keystore 2>/dev/null || echo "0")
            echo "📦 Keystore size: $KEYSTORE_SIZE bytes"
            
            if [ "$KEYSTORE_SIZE" -lt 1000 ]; then
              echo "❌ ERROR: Keystore file is too small ($KEYSTORE_SIZE bytes)"
              echo "❌ The keystore may be corrupted or empty!"
              exit 1
            fi
            
            # 添加签名配置
            cat >> gradle.properties << EOF

# 签名配置
RELEASE_STORE_FILE=./keystore/release.keystore
RELEASE_STORE_PASSWORD=${{ secrets.RELEASE_STORE_PASSWORD }}
RELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }}
RELEASE_KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }}
EOF
            
            echo "✅ Signing configuration added"
            
            # 可选：验证密钥库格式
            if command -v keytool &> /dev/null; then
              echo "🔐 Testing keystore access..."
              if keytool -list -keystore $GITHUB_WORKSPACE/keystore/release.keystore \
                 -storepass "${{ secrets.RELEASE_STORE_PASSWORD }}" \
                 -alias "${{ secrets.RELEASE_KEY_ALIAS }}" &>/dev/null; then
                echo "✅ Keystore verification successful"
              else
                echo "⚠️ Keystore verification failed, but continuing..."
              fi
            fi
            
          else
            echo "⚠️ WARNING: RELEASE_KEY_STORE_BASE64 secret not found!"
            echo "⚠️ Building with DEBUG signing (for testing only)"
            
            cat >> gradle.properties << EOF

# 使用debug签名
# RELEASE_STORE_FILE=./keystore/release.keystore
# RELEASE_STORE_PASSWORD=***
# RELEASE_KEY_ALIAS=***
# RELEASE_KEY_PASSWORD=***
EOF
          fi
          
          # 显示配置（隐藏敏感信息）
          echo ""
          echo "📋 gradle.properties content (sanitized):"
          cat gradle.properties | grep -v "PASSWORD" || true

      - name: Debug Configuration
        run: |
          echo "🔍 Debug information:"
          echo "1. Checking environment variables..."
          env | grep -i "key\|store\|secret" || echo "No relevant env vars found"
          echo ""
          echo "2. Checking gradle.properties..."
          if [ -f "gradle.properties" ]; then
            echo "File exists, key properties:"
            grep -E "^(Cronet|RELEASE_|org\.gradle|android\.)" gradle.properties | head -20
          fi
          echo ""
          echo "3. Checking keystore..."
          if [ -f "./keystore/release.keystore" ]; then
            echo "✅ Keystore file exists: $(stat -c%s ./keystore/release.keystore) bytes"
          else
            echo "⚠️ No keystore file found"
          fi

      - name: Build Release APK
        run: |
          echo "🚀 Starting build..."
          chmod +x gradlew
          
          # 检查是release还是debug构建
          if [ -f "./keystore/release.keystore" ]; then
            echo "🔨 Building RELEASE version with production signing..."
            
            # 先清理
            ./gradlew clean
            
            # 构建release
            ./gradlew assembleAppRelease \
              --stacktrace \
              --info \
              --no-daemon \
              --no-configuration-cache \
              -x lint \
              -Pandroid.injected.signing=true
          else
            echo "🔧 Building DEBUG version (no keystore)..."
            
            # 先清理
            ./gradlew clean
            
            # 构建debug
            ./gradlew assembleAppDebug \
              --stacktrace \
              --info \
              --no-daemon \
              --no-configuration-cache \
              -x lint
          fi
          
          echo "✅ Build completed!"

      - name: Check APK Output
        run: |
          echo "📦 Checking for APK files..."
          
          # 确定构建类型
          if [ -f "./keystore/release.keystore" ]; then
            BUILD_DIR="app/build/outputs/apk/app/release"
            BUILD_TYPE="release"
          else
            BUILD_DIR="app/build/outputs/apk/app/debug"
            BUILD_TYPE="debug"
          fi
          
          echo "Looking in: $BUILD_DIR"
          
          if [ -d "$BUILD_DIR" ]; then
            echo "📁 Directory contents:"
            ls -la "$BUILD_DIR/"
            
            APK_FILES=$(find "$BUILD_DIR" -name "*.apk" -type f)
            if [ -n "$APK_FILES" ]; then
              echo "✅ Found APK files:"
              for apk in $APK_FILES; do
                echo "  - $apk ($(stat -c%s "$apk") bytes)"
              done
            else
              echo "❌ No APK files found in $BUILD_DIR"
              echo "Trying to find any APK files..."
              find app/build/outputs -name "*.apk" -type f || echo "No APK files found anywhere"
              exit 1
            fi
          else
            echo "❌ Build directory not found: $BUILD_DIR"
            echo "Full build output:"
            find app/build -type d | sort
            exit 1
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v6
        with:
          name: legado_apk
          path: app/build/outputs/apk/**/*.apk
          retention-days: 30
