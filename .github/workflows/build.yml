# 已禁用 - 使用 android-ci-cd.yml 替代
name: Build APK (DISABLED)
on:
  workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Build Release
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: legado_apk
          path: app/build/outputs/apk/release/
