name: Build Signed Release APK
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEY_STORE_BASE64 }}
        run: |
          # 调试：检查 secret 是否被正确读取
          echo "📌 检查 secret 配置..."
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "❌ 错误：RELEASE_KEY_STORE secret 为空！"
            echo "❌ 请在 GitHub Settings → Secrets and variables → Actions 中配置 RELEASE_KEY_STORE"
            echo "❌ 注意：GitHub Secrets 名称区分大小写"
            exit 1
          fi
          
          echo "✅ Secret 已读取，长度：${#KEYSTORE_BASE64} 字符"
          echo "   （出于安全考虑，不显示内容）"
          
          mkdir -p keystore
          
          # 移除所有空白字符后解码
          echo "$KEYSTORE_BASE64" | tr -d '[:space:]' | base64 -d > keystore/release.keystore
          echo "✅ Keystore 已创建"
          
          # 验证 keystore 文件
          KEYSTORE_SIZE=$(stat -c%s keystore/release.keystore 2>/dev/null || echo "0")
          echo "📦 Keystore 文件大小：$KEYSTORE_SIZE bytes"
          
          if [ "$KEYSTORE_SIZE" -lt 1000 ]; then
            echo "❌ 错误：Keystore 文件过小，可能已损坏！"
            echo "   实际大小：$KEYSTORE_SIZE bytes"
            echo "   预期大小：至少 1KB"
            echo "❌ 请检查 GitHub Settings 中的 RELEASE_KEY_STORE secret 配置"
            echo ""
            echo "📝 如何生成正确的 secret："
            echo "   1. 在本地终端运行：base64 -w 0 release.keystore | xclip -selection clipboard"
            echo "   2. 将输出粘贴到 GitHub Secrets"
            exit 1
          fi
          
          # 创建 gradle.properties
          echo "RELEASE_STORE_FILE=./keystore/release.keystore" > gradle.properties
          echo "RELEASE_STORE_PASSWORD=${{ secrets.RELEASE_STORE_PASSWORD }}" >> gradle.properties
          echo "RELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }}" >> gradle.properties
          echo "RELEASE_KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }}" >> gradle.properties
          echo "✅ 签名配置已完成"
          cat gradle.properties

      - name: Build Release APK
        run: |
          chmod +x gradlew
          # 显示当前 gradle.properties 配置（用于调试）
          echo "📋 Current gradle.properties:"
          cat gradle.properties | grep -v "PASSWORD" || echo "No gradle.properties found"
          echo ""
          
          # 禁用 configuration-cache 和 build-cache 确保每次构建都使用最新的签名配置
          ./gradlew assembleAppRelease \
            --no-daemon \
            --no-configuration-cache \
            --no-build-cache \
            -x lint \
            -Pandroid.injected.signing=true
          
          echo ""
          echo "📦 Build completed, checking APK..."

      - name: Check APK output
        run: |
          echo "📦 Checking for signed APK files..."
          find app/build/outputs -name "*.apk" -type f
          ls -la app/build/outputs/apk/app/release/ || echo "Release directory not found"
          
          # 获取 APK 文件名
          APK_FILE=$(find app/build/outputs/apk/app/release -name "*.apk" -type f | head -1)
          
          if [ ! -z "$APK_FILE" ] && [ -f "$APK_FILE" ]; then
            echo "✅ Found APK: $APK_FILE"
            echo "📦 APK size: $(stat -c%s "$APK_FILE") bytes"
            
            # 如果有 apksigner，验证签名
            if command -v apksigner &> /dev/null; then
              echo "🔐 Verifying APK signature..."
              apksigner verify --verbose "$APK_FILE" || echo "⚠️ Signature verification issues detected"
            else
              echo "⚠️ apksigner not available, skipping signature verification"
            fi
          else
            echo "❌ ERROR: No APK file found!"
            exit 1
          fi

      - name: Upload Signed APK
        uses: actions/upload-artifact@v6
        with:
          name: legado_release_signed_apk
          path: app/build/outputs/apk/app/release/*.apk
          retention-days: 30

      - name: Generate Version Info
        id: version
        run: |
          # 使用基于日期的版本号格式
          VERSION_CODE=$(date -u +3.%y%m%d%H%M)
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "📦 Building version: $VERSION_CODE"
          
          # 显示当前 git 信息
          echo "Git commit: $(git rev-parse --short HEAD)"
          echo "Git branch: $(git rev-parse --abbrev-ref HEAD)"

      - name: Create Release Tag
        run: |
          TAG_NAME="v${{ steps.version.outputs.VERSION_CODE }}"
          echo "Release version: $TAG_NAME"
          
          # 配置 git 用户信息
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 检查标签是否已存在
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG_NAME"; then
            echo "⚠️ Tag $TAG_NAME already exists on remote, using existing tag"
          else
            echo "Creating new tag: $TAG_NAME"
            git tag $TAG_NAME
            git push origin $TAG_NAME || echo "Failed to push tag"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.VERSION_CODE }}
          name: "Legado ${{ steps.version.outputs.VERSION_CODE }}"
          body: |
            ## 📦 自动化构建发布
            
            **构建时间**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
            **Commit**: ${{ github.sha }}
            **版本**: ${{ steps.version.outputs.VERSION_CODE }}
            **分支**: ${{ github.ref_name }}
            
            ### 📥 下载说明
            - 直接下载 APK 文件即可安装
            - 签名一致，支持覆盖安装
            
            ### 🔧 构建信息
            - 构建类型: Release
            - 目标平台: Android
            - 最小 SDK: 24
            - 目标 SDK: 36
          draft: false
          prerelease: false
          generate_release_notes: true
          files: app/build/outputs/apk/app/release/*.apk
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
