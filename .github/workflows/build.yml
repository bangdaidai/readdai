name: Build Signed Release APK
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Android Signing
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEY_STORE_BASE64 }}
        run: |
          if [ ! -z "$KEYSTORE_BASE64" ]; then
            mkdir -p $GITHUB_WORKSPACE
            printf '%s' "$KEYSTORE_BASE64" | base64 --decode > $GITHUB_WORKSPACE/release.keystore

            echo "RELEASE_STORE_FILE=$GITHUB_WORKSPACE/release.keystore" >> gradle.properties
            echo "RELEASE_STORE_PASSWORD=${{ secrets.RELEASE_STORE_PASSWORD }}" >> gradle.properties
            echo "RELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }}" >> gradle.properties
            echo "RELEASE_KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }}" >> gradle.properties
          fi

      - name: Build Release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleAppRelease --no-daemon -x lint 2>&1

      - name: Show error log if build failed
        if: failure()
        run: |
          echo "构建失败，查看最后100行日志:"
          tail -100 app/build/outputs/logs/*.log 2>/dev/null || echo "无日志文件"
          echo ""
          echo "查看 build 目录:"
          ls -la app/build/ 2>/dev/null || echo "build 目录不存在"

      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: legado_release_apk
          path: app/build/outputs/apk/app/release/*.apk
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Download Release APK
        uses: actions/download-artifact@v6
        with:
          name: legado_release_apk
          path: artifacts

      - name: Get version info
        id: version
        run: |
          VERSION=$(grep -oP 'def version = "\K[^"]+' app/build.gradle || echo "1.0.0")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body: "Release v${{ steps.version.outputs.version }}"
          files: artifacts/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
