name: Build Signed Release APK
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Android Signing
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEY_STORE_BASE64 }}
        run: |
          if [ ! -z "$KEYSTORE_BASE64" ]; then
            echo "✅ Using RELEASE_KEY_STORE_BASE64 secret for consistent signing"
            echo "Setting up signing keys..."
            printf '%s' "$KEYSTORE_BASE64" | base64 --decode > $GITHUB_WORKSPACE/release.keystore
            echo "RELEASE_STORE_FILE=$GITHUB_WORKSPACE/release.keystore" >> gradle.properties
            echo "RELEASE_STORE_PASSWORD=${{ secrets.RELEASE_STORE_PASSWORD }}" >> gradle.properties
            echo "RELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }}" >> gradle.properties
            echo "RELEASE_KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }}" >> gradle.properties
            echo "✅ Keystore setup completed at $GITHUB_WORKSPACE/release.keystore"
            echo "📊 Keystore file size: $(stat -c%s $GITHUB_WORKSPACE/release.keystore) bytes"
            ls -la $GITHUB_WORKSPACE/release.keystore
            echo ""
            echo "📋 Gradle properties configured:"
            cat gradle.properties | grep -E "RELEASE_"
          else
            echo "⚠️ No keystore configured, using debug signing"
            echo "⚠️ This will cause different signatures for each build!"
            echo "⚠️ Please configure RELEASE_KEY_STORE_BASE64 secret in GitHub Settings"
          fi

      - name: Build Release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleAppRelease --no-daemon -x lint

      - name: Check APK output
        run: |
          echo "📦 Checking for signed APK files..."
          find app/build/outputs -name "*.apk" -type f
          ls -la app/build/outputs/apk/app/release/ || echo "Release directory not found"

      - name: Upload Signed APK
        uses: actions/upload-artifact@v6
        with:
          name: legado_release_signed_apk
          path: app/build/outputs/apk/app/release/*.apk
          retention-days: 30
