name: Build APK Without R8 Obfuscation
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Android Signing
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEY_STORE_BASE64 }}
        run: |
          if [ ! -z "$KEYSTORE_BASE64" ]; then
            echo "Setting up signing keys..."
            printf '%s' "$KEYSTORE_BASE64" | base64 --decode > $GITHUB_WORKSPACE/release.keystore
            echo "" >> gradle.properties
            echo "RELEASE_STORE_FILE=$GITHUB_WORKSPACE/release.keystore" >> gradle.properties
            echo "RELEASE_STORE_PASSWORD=${{ secrets.RELEASE_STORE_PASSWORD }}" >> gradle.properties
            echo "RELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }}" >> gradle.properties
            echo "RELEASE_KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }}" >> gradle.properties
          else
            echo "Keystore not configured, using debug signing"
          fi

      - name: Build Release APK (No R8)
        run: |
          chmod +x gradlew
          ./gradlew assembleAppReleaseNoR8 --no-daemon -x lint

      - name: Check APK output
        run: |
          find app/build/outputs -name "*.apk" -type f
          ls -la app/build/outputs/apk/app/releaseNoR8/ || echo "releaseNoR8 directory not found"

      - name: Upload APK (No R8)
        uses: actions/upload-artifact@v6
        with:
          name: legado_release_no_r8_apk
          path: app/build/outputs/apk/app/releaseNoR8/*.apk
          retention-days: 30
