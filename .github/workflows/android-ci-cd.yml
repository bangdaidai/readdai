name: Android CI/CD Pipeline

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: '选择构建类型'
        required: true
        default: 'release'
        type: choice
        options:
          - release
  push:
    branches:
      - master
  pull_request:
    types: [closed]

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g -XX:+UseParallelGC"
  ORG_GRADLE_PROJECT_kotlin_daemon_jvmargs: "-Xmx1536m -XX:MaxMetaspaceSize=512m"
  GRADLE_BUILD_CACHE: true

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/build-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run Lint
        run: ./gradlew lintAppDebug --no-daemon

      - name: Run Unit Tests
        run: ./gradlew testAppDebug --no-daemon

      - name: Upload Lint Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: app/build/reports/lint-results-appDebug.html

  build-release:
    name: Build Release APK/AAB
    needs: lint-and-test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/build-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Setup Android Signing
        run: |
          # 统一使用 RELEASE_KEY_STORE secret 名称，确保签名一致性
          KEYSTORE="${{ secrets.RELEASE_KEY_STORE }}"
          
          if [ ! -z "$KEYSTORE" ]; then
            echo "✅ Using RELEASE_KEY_STORE secret for consistent signing"
            echo "Setting up signing keys..."
            # 使用固定的密钥文件路径，确保签名一致性
            mkdir -p $GITHUB_WORKSPACE/keystore
            echo "$KEYSTORE" | base64 --decode > $GITHUB_WORKSPACE/keystore/release.keystore
            echo "RELEASE_STORE_FILE=./keystore/release.keystore" >> gradle.properties
            echo "RELEASE_STORE_PASSWORD=${{ secrets.RELEASE_STORE_PASSWORD }}" >> gradle.properties
            echo "RELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }}" >> gradle.properties
            echo "RELEASE_KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }}" >> gradle.properties
            echo "✅ Keystore loaded successfully at ./keystore/release.keystore"
            ls -la $GITHUB_WORKSPACE/keystore/release.keystore
          else
            echo "⚠️ No signing keys configured, build will use debug signature"
            echo "⚠️ This will cause different signatures for each build!"
            echo "⚠️ Please configure RELEASE_KEY_STORE secret in GitHub Settings"
          fi

      - name: Generate Version Info
        id: version
        run: |
          # 使用基于日期的版本号格式，确保唯一性
          VERSION_CODE=$(date -u +3.%y%m%d%H%M)
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "📦 Building version: $VERSION_CODE"
          echo "$VERSION_CODE" > version.txt
          
          # 显示当前 git 信息用于调试
          echo "Git commit: $(git rev-parse --short HEAD)"
          echo "Git branch: $(git rev-parse --abbrev-ref HEAD)"

      - name: Upload Version Info
        uses: actions/upload-artifact@v4
        with:
          name: version-info
          path: version.txt

      - name: Unify Version Name
        run: |
          sed "/def version/c def version = \"$(cat version.txt)\"" $GITHUB_WORKSPACE/app/build.gradle -i
          echo "✅ Version updated in build.gradle"

      - name: Build Release APK
        run: ./gradlew assembleAppRelease --no-daemon

      - name: Check Release APK output
        run: |
          echo "Checking for Release APK files..."
          find app/build/outputs -name "*.apk" -type f || echo "No APK found"
          ls -la app/build/outputs/apk/app/release/ 2>/dev/null || echo "Release directory not found"

      - name: Build Release AAB (Google Play)
        run: ./gradlew bundleAppRelease --no-daemon

      - name: Check AAB output
        run: |
          echo "Checking for AAB files..."
          find app/build/outputs -name "*.aab" -type f || echo "No AAB found"
          ls -la app/build/outputs/bundle/appRelease/ 2>/dev/null || echo "AAB directory not found"

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: |
            app/build/outputs/apk/app/release/*.apk
            app/build/outputs/apk/**/*.apk
          retention-days: 90
          if-no-files-found: warn

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: |
            app/build/outputs/bundle/appRelease/*.aab
            app/build/outputs/bundle/**/*.aab
          retention-days: 90
          if-no-files-found: warn

      - name: Generate Release Info
        run: |
          echo "Release Build Time: $(date)" > release-info.txt
          echo "Commit: ${{ github.sha }}" >> release-info.txt
          echo "Version: $(cat version.txt)" >> release-info.txt
          cat app/build/outputs/apk/app/release/*.txt 2>/dev/null || echo "No version info" >> release-info.txt

      - name: Upload Release Info
        uses: actions/upload-artifact@v4
        with:
          name: release-info
          path: release-info.txt

  create-release:
    name: Create GitHub Release
    needs: build-release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: artifacts/apk

      - name: Download Release AAB
        uses: actions/download-artifact@v4
        with:
          name: release-aab
          path: artifacts/aab

      - name: Download Version Info
        uses: actions/download-artifact@v4
        with:
          name: version-info
          path: artifacts

      - name: Read Version Info
        id: read_version
        run: |
          if [ -f artifacts/version.txt ]; then
            VERSION=$(cat artifacts/version.txt)
          else
            VERSION=$(date -u +3.%y%m%d%H%M)
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Release version: $VERSION"

      - name: List Artifacts
        run: |
          echo "Available APK files:"
          find artifacts/apk -name "*.apk" -type f
          echo "Available AAB files:"
          find artifacts/aab -name "*.aab" -type f

      - name: Create Release Tag
        if: startsWith(github.ref, 'refs/tags/') != true
        run: |
          TAG_NAME="v$(cat artifacts/version.txt)"
          echo "Creating tag: $TAG_NAME"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag $TAG_NAME
          git push origin $TAG_NAME || echo "Tag may already exist"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.read_version.outputs.VERSION }}
          name: "Legado ${{ steps.read_version.outputs.VERSION }}"
          body: |
            ## 📦 自动化构建发布
            
            **构建时间**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
            **Commit**: ${{ github.sha }}
            **版本**: ${{ steps.read_version.outputs.VERSION }}
            
            ### 📥 下载说明
            - 直接下载 APK 文件即可安装
            - 签名一致，支持覆盖安装
            
            ### 🔧 构建信息
            - 构建类型: Release
            - 目标平台: Android
            - 最小 SDK: 24
            - 目标 SDK: 36
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/apk/*.apk
            artifacts/aab/*.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Notify Build Status
    needs: [build-release]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.build-release.result }}" = "success" ]; then
            echo "✅ Build completed successfully!"
            echo "📦 APK/AAB files ready for release"
          else
            echo "❌ Build failed!"
            exit 1
          fi
