name: Android CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: '选择构建类型'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
          - both

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx6g -XX:+UseParallelGC"
  GRADLE_BUILD_CACHE: true

jobs:
  # 代码检查和测试
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run Lint
        run: ./gradlew lintAppDebug --no-daemon

      - name: Run Unit Tests
        run: ./gradlew testAppDebug --no-daemon

      - name: Upload Lint Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: app/build/reports/lint-results-appDebug.html

  # Debug 构建
  build-debug:
    name: Build Debug APK
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || 
        (github.event_name == 'workflow_dispatch' && 
         (github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == 'both'))
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleAppDebug --no-daemon --info

      - name: Check APK output
        run: |
          echo "Checking for APK files..."
          find app/build/outputs -name "*.apk" -type f || echo "No APK found"
          ls -la app/build/outputs/apk/app/debug/ 2>/dev/null || echo "Debug directory not found"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: |
            app/build/outputs/apk/app/debug/*.apk
            app/build/outputs/apk/**/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Generate Build Info
        run: |
          echo "Build Time: $(date)" > build-info.txt
          echo "Commit: ${{ github.sha }}" >> build-info.txt
          echo "Branch: ${{ github.ref_name }}" >> build-info.txt
          echo "Actor: ${{ github.actor }}" >> build-info.txt

      - name: Upload Build Info
        uses: actions/upload-artifact@v4
        with:
          name: build-info
          path: build-info.txt

  # Release 构建（需要签名密钥）
  build-release:
    name: Build Release APK/AAB
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (github.event_name == 'workflow_dispatch' && 
         (github.event.inputs.build_type == 'release' || github.event.inputs.build_type == 'both'))
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Setup Android Signing
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ ! -z "$KEYSTORE_BASE64" ]; then
            echo "Setting up signing keys..."
            echo $KEYSTORE_BASE64 | base64 --decode > $GITHUB_WORKSPACE/app/release.keystore
            echo "RELEASE_STORE_FILE=./release.keystore" >> gradle.properties
            echo "RELEASE_STORE_PASSWORD=${{ secrets.RELEASE_STORE_PASSWORD }}" >> gradle.properties
            echo "RELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }}" >> gradle.properties
            echo "RELEASE_KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }}" >> gradle.properties
          fi

      - name: Build Release APK
        run: ./gradlew assembleAppRelease --no-daemon --info

      - name: Check Release APK output
        run: |
          echo "Checking for Release APK files..."
          find app/build/outputs -name "*.apk" -type f || echo "No APK found"
          ls -la app/build/outputs/apk/app/release/ 2>/dev/null || echo "Release directory not found"

      - name: Build Release AAB (Google Play)
        run: ./gradlew bundleAppRelease --no-daemon --info

      - name: Check AAB output
        run: |
          echo "Checking for AAB files..."
          find app/build/outputs -name "*.aab" -type f || echo "No AAB found"
          ls -la app/build/outputs/bundle/appRelease/ 2>/dev/null || echo "AAB directory not found"

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: |
            app/build/outputs/apk/app/release/*.apk
            app/build/outputs/apk/**/*.apk
          retention-days: 90
          if-no-files-found: warn

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: |
            app/build/outputs/bundle/appRelease/*.aab
            app/build/outputs/bundle/**/*.aab
          retention-days: 90
          if-no-files-found: warn

      - name: Generate Release Info
        run: |
          echo "Release Build Time: $(date)" > release-info.txt
          echo "Commit: ${{ github.sha }}" >> release-info.txt
          echo "Tag: ${{ github.ref_name }}" >> release-info.txt
          cat app/build/outputs/apk/app/release/*.txt 2>/dev/null || echo "No version info" >> release-info.txt

      - name: Upload Release Info
        uses: actions/upload-artifact@v4
        with:
          name: release-info
          path: release-info.txt

  # 自动发布到 GitHub Releases（仅当有标签时）
  create-release:
    name: Create GitHub Release
    needs: build-release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download Release APK
        uses: actions/download-artifact@v8
        with:
          name: release-apk
          path: artifacts/apk

      - name: Download Release AAB
        uses: actions/download-artifact@v8
        with:
          name: release-aab
          path: artifacts/aab

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/apk/*.apk
            artifacts/aab/*.aab
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 通知构建结果
  notify:
    name: Notify Build Status
    needs: [build-debug, build-release]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.build-debug.result }}" = "success" ] || [ "${{ needs.build-release.result }}" = "success" ]; then
            echo "✅ Build completed successfully!"
          else
            echo "❌ Build failed!"
            exit 1
          fi