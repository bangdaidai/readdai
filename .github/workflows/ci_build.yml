name: CI Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Generate Debug Keystore
        run: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            echo "Generating debug.keystore..."
            keytool -genkeypair -v -storetype PKCS12 -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
            echo "Debug keystore generated successfully"
          else
            echo "Debug keystore already exists"
          fi
          ls -lh ~/.android/debug.keystore

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: 8.14.4
          cache-read-only: false
      
      - name: Build
        run: |
          chmod +x gradlew
          ./gradlew assembleAppDebug --no-daemon 2>&1 | tee build.log
          tail -100 build.log
      
      - name: Check output
        run: |
          echo "=== APK Files ==="
          find app/build/outputs -name "*.apk" -type f -exec ls -lh {} \;
      
      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: debug-apk
          path: app/build/outputs/apk/app/debug/*.apk
          retention-days: 7
