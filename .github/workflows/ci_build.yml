name: CI Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: 8.14.4
          cache-read-only: false
      
      - name: Build
        run: |
          chmod +x gradlew
          ./gradlew assembleAppDebug --no-daemon 2>&1 | tee build.log
          tail -100 build.log
      
      - name: Check output
        run: |
          echo "Checking APK output..."
          find app/build/outputs -name "*.apk" 2>/dev/null || echo "No APK found"
      
      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: debug-apk
          path: app/build/outputs/apk/app/debug/*.apk
          retention-days: 7
